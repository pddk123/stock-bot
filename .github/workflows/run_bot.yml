name: Daily Stock Analysis

on:
  schedule:
    # 한국 시간(KST) 오전 09:49 실행 (UTC 00:49)
    - cron: '49 00 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # 딱 이 한 줄만 있으면 됩니다. Pandas 1.5.3으로 강제 고정!
          pip install pandas==1.5.3 finance-datareader requests lxml pykrx

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
